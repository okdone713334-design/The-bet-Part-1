<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Bet · Banker & Lawyer (1-50)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #1e3c2c, #0e2a1f 90%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 8px;
            margin: 0;
            perspective: 1200px;
        }

        /* main 3D card – fits perfectly */
        .threeD-card {
            max-width: 500px;
            width: 100%;
            background: rgba(215, 225, 200, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 60px 60px 50px 50px;
            padding: 20px 18px 15px 18px;
            box-shadow: 
                0 30px 40px -15px #000000cc,
                0 0 0 2px #c0b28a,
                inset 0 -8px 12px #8f7d5c,
                inset 0 8px 12px #f2f0d2;
            transform: rotateX(2deg) rotateY(-0.5deg) translateZ(8px);
            border: 1px solid #dac292;
            transition: transform 0.2s;
            max-height: 95vh;
            display: flex;
            flex-direction: column;
        }

        .threeD-card:hover {
            transform: rotateX(1deg) rotateY(-0.2deg) translateZ(12px);
        }

        /* header */
        .header-3d {
            text-align: center;
            margin-bottom: 6px;
            filter: drop-shadow(0 8px 6px #00000050);
        }
        .glow-title {
            font-size: 2.3rem;
            font-weight: 900;
            background: linear-gradient(145deg, #2b4b2b, #5f6b3a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 4px 4px 0 #b8a87c, 6px 6px 10px #00000070;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .glow-title span {
            font-size: 2.2rem;
            filter: drop-shadow(0 0 6px #ecd67a);
        }
        .author-3d {
            font-size: 1.4rem;
            font-weight: 700;
            background: #3d5e3d;
            color: #f0ecd6;
            display: inline-block;
            padding: 5px 30px;
            border-radius: 60px;
            border: 3px solid #ccb277;
            box-shadow: 0 10px 0 #24422c, 0 12px 18px black;
            margin: 6px 0 4px;
            transform: rotate(-0.5deg);
        }
        .fifty-3d {
            font-size: 1.2rem;
            font-weight: 800;
            background: #52452b;
            color: #ffefc0;
            padding: 6px 28px;
            border-radius: 60px;
            border: 2px solid #c5a15b;
            box-shadow: inset 0 -5px 0 #3f321d, 0 9px 0 #332b18;
            display: inline-block;
            transform: translateY(-3px);
            margin-bottom: 5px;
        }

        /* progress row */
        .progress-3d {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #7f8f6b80;
            padding: 6px 14px 6px 18px;
            border-radius: 50px;
            border: 2px solid #af9b64;
            box-shadow: inset 0 2px 8px #e8dbaa, 0 6px 0 #4f6040;
            margin: 5px 0 12px;
        }
        .prog-track {
            flex: 1;
            height: 18px;
            background: #2d3d24;
            border-radius: 30px;
            border: 2px solid #9c8a52;
            overflow: hidden;
            box-shadow: inset 0 3px 6px #141f10;
        }
        .prog-glow {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #edd48b, #d69d3a);
            border-radius: 30px;
            box-shadow: 0 0 18px #f8b551;
            transition: width 0.3s;
        }
        .streak-3d {
            background: #6f563a;
            color: #ffeec9;
            padding: 6px 22px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.3rem;
            border: 2px solid #e7b56c;
            box-shadow: 0 6px 0 #4f3f26, inset 0 2px 10px #ffd994;
            white-space: nowrap;
        }

        /* question panel */
        .question-vault {
            background: #dee2c0;
            border-radius: 42px;
            padding: 20px 18px;
            border: 3px solid #9b8b5c;
            box-shadow: inset 0 -8px 0 #837951, inset 0 8px 12px #ffffe0, 0 18px 20px -8px #000000b0;
            margin-bottom: 8px;
        }
        .q-3d {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1f3c2d;
            line-height: 1.4;
            padding-left: 14px;
            border-left: 12px solid #b58f4f;
            text-shadow: 1px 1px 0 #dbd6a4;
            margin-bottom: 20px;
        }

        .options-3d {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .opt-3d {
            background: #f5f2dd;
            border: 3px solid #8f7b48;
            border-radius: 50px;
            padding: 13px 18px 13px 12px;
            display: flex;
            align-items: center;
            gap: 22px;
            font-weight: 600;
            font-size: 1.1rem;
            color: #1f3f2f;
            cursor: pointer;
            box-shadow: 0 9px 0 #5f6b3a, 0 10px 18px #1a2f1f80;
            transition: 0.08s linear;
            transform: translateY(-2px);
        }
        .opt-3d:active {
            transform: translateY(5px);
            box-shadow: 0 4px 0 #5f6b3a, 0 10px 18px #1a2f1f80;
        }
        .opt-3d.disabled {
            pointer-events: none;
            filter: brightness(1.05);
            opacity: 0.95;
        }
        .opt-3d.correct {
            background: #bfddb0;
            border-color: #3c854a;
            box-shadow: 0 7px 0 #2a6b32, 0 10px 18px #1d5428;
        }
        .opt-3d.wrong {
            background: #f3cfbe;
            border-color: #b1583a;
            box-shadow: 0 7px 0 #944b30, 0 10px 18px #692d1b;
        }
        .letter-3d {
            background: #676f42;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 900;
            color: #fcf3cf;
            border: 4px solid #eac382;
            box-shadow: 0 4px 0 #3f4729;
        }
        .correct .letter-3d { background: #1f7845; border-color: #f7eca9; }
        .wrong .letter-3d { background: #b6492e; border-color: #ffdbaa; }

        .feedback-3d {
            background: #c0bc8f;
            border-radius: 60px;
            padding: 10px 24px;
            font-weight: 700;
            display: inline-block;
            margin-top: 12px;
            border: 2px solid #888249;
            box-shadow: inset 0 2px 8px #fffbc2, 0 5px 0 #5e623b;
            color: #1f3825;
        }

        /* bottom controls */
        .bottom-controls {
            margin-top: 4px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .nav-3d {
            display: flex;
            gap: 12px;
            justify-content: space-between;
        }
        .nav-btn-3d {
            flex: 1;
            background: #ccbf93;
            border: 4px solid #857642;
            border-radius: 60px;
            padding: 14px 5px;
            font-weight: 800;
            font-size: 1.2rem;
            color: #1d3f2a;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 9px 0 #61663c, 0 8px 14px #00000060;
            transition: 0.06s;
            transform: translateY(-3px);
        }
        .nav-btn-3d:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #61663c, 0 8px 14px #00000060;
        }
        .nav-btn-3d:disabled {
            opacity: 0.45;
            transform: translateY(0);
            box-shadow: 0 5px 0 #4f5433;
            pointer-events: none;
        }

        /* horizontal scroller */
        .chip-scroller {
            background: #687a4d80;
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 12px 8px;
            border: 3px solid #aa9457;
            box-shadow: inset 0 2px 8px #f3efba, 0 10px 0 #495634;
            margin: 5px 0 6px;
        }
        .scroll-label-3d {
            font-size: 0.9rem;
            font-weight: 600;
            color: #17321f;
            background: #cfc196;
            display: inline-block;
            padding: 6px 20px;
            border-radius: 40px;
            margin-bottom: 12px;
            border: 2px solid #9e884b;
            box-shadow: inset 0 2px 8px #fff7cf, 0 5px 0 #5f6b41;
            transform: translateY(-3px);
        }
        .chip-horizontal {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 6px 3px 14px 3px;
            scrollbar-width: thin;
            scrollbar-color: #9b884b #dacaa4;
            -webkit-overflow-scrolling: touch;
        }
        .chip-horizontal::-webkit-scrollbar {
            height: 7px;
        }
        .chip-horizontal::-webkit-scrollbar-thumb {
            background: #9b884b;
            border-radius: 30px;
        }
        .num-chip-3d {
            min-width: 54px;
            height: 54px;
            border-radius: 40px;
            background: #e3dcb1;
            border: 4px solid #877e43;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.4rem;
            color: #232b12;
            box-shadow: 0 7px 0 #535f32, 0 6px 12px #00000070;
            cursor: pointer;
            flex-shrink: 0;
            transition: 0.05s;
        }
        .num-chip-3d:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #535f32, 0 6px 12px #00000070;
        }
        .num-chip-3d.current-chip {
            background: #d8b567;
            border-color: #6b592b;
            color: white;
            transform: scale(1.07);
            box-shadow: 0 0 0 4px #f7da95, 0 7px 0 #5c512b;
        }
        .num-chip-3d.answered-chip {
            background: #adcf9a;
            border-color: #468049;
        }

        /* review and score */
        .review-3d {
            background: #c5bc8b;
            border-radius: 40px;
            padding: 12px 15px;
            max-height: 85px;
            overflow-y: auto;
            border: 3px solid #96874d;
            box-shadow: inset 0 0 12px #ffffdd;
            font-size: 0.9rem;
            margin: 8px 0 4px;
        }
        .score-3d {
            background: #a59958;
            border-radius: 60px;
            padding: 10px 20px;
            font-size: 2rem;
            font-weight: 900;
            text-align: center;
            border: 5px solid #ecd998;
            box-shadow: 0 8px 0 #5f663b, inset 0 2px 16px #ffffcf;
            margin: 8px 0 2px;
        }
        .restart-3d {
            background: #5d6a40;
            color: #fcf2bf;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.3rem;
            border: 4px solid #caac64;
            box-shadow: 0 12px 0 #3a492a, 0 8px 18px black;
            text-align: center;
            cursor: pointer;
            transition: 0.08s;
            transform: translateY(-3px);
            margin-top: 5px;
        }
        .restart-3d:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #3a492a, 0 8px 18px black;
        }
    </style>
</head>
<body>
    <div class="threeD-card" id="quizCard">
        <!-- header 3D -->
        <div class="header-3d">
            <div class="glow-title"><span>⚖️</span> THE BET <span>⚖️</span></div>
            <div class="author-3d">Anton Chekhov</div>
            <div class="fifty-3d">📜 MCQ QUIZ (1-50) 📜</div>
        </div>

        <!-- progress + streak -->
        <div class="progress-3d">
            <div class="prog-track"><div class="prog-glow" id="progressFill"></div></div>
            <div class="streak-3d" id="streakDisplay">🔥 0</div>
        </div>

        <!-- question vault -->
        <div class="question-vault">
            <div class="q-3d" id="questionText">Loading...</div>
            <div class="options-3d" id="optionsContainer"></div>
            <div class="feedback-3d" id="feedbackMsg">✨ choose an option</div>
        </div>

        <!-- BOTTOM CONTROLS: prev/next + number scroller -->
        <div class="bottom-controls">
            <div class="nav-3d">
                <button class="nav-btn-3d" id="prevBtn" disabled>◀ PREV</button>
                <button class="nav-btn-3d" id="nextBtn">NEXT ▶</button>
            </div>

            <!-- horizontal number scroller (with label) -->
            <div class="chip-scroller">
                <div class="scroll-label-3d">
                    📌 আপনি যদি কুইজ খেলতে না চান তবে যে কোন নাম্বারের কোশ্চেন এখানে দেখতে পাবেন। দেখার জন্য নাম্বারে ক্লিক করতে হবে।
                </div>
                <div class="chip-horizontal" id="numberScroll"></div>
            </div>
        </div>

        <!-- review & score -->
        <div class="review-3d" id="reviewContainer" style="display: none;"></div>
        <div class="score-3d" id="scoreDisplay" style="display: none;">🏆 <span id="scoreValue">0</span>/50</div>
        <div class="restart-3d" id="restartBtn">⟲ RESTART</div>
    </div>

    <script>
        (function() {
            // Questions 1 to 50 – The Bet (Banker & Lawyer) based on user's provided data
            const questions = [
                {
                    q: "1. What kind of night was it when the old banker was walking in his study?",
                    a: "A warm summer night",
                    b: "A bright spring morning",
                    c: "A dark autumn night",
                    d: "A cold winter evening",
                    correct: "C"
                },
                {
                    q: "2. What was the old banker doing in his study?",
                    a: "Reading a book",
                    b: "Counting his money",
                    c: "Walking up and down and remembering",
                    d: "Writing a letter",
                    correct: "C"
                },
                {
                    q: "3. How long ago had the banker given a party?",
                    a: "Five years before",
                    b: "Ten years before",
                    c: "Fifteen years before",
                    d: "Twenty years before",
                    correct: "C"
                },
                {
                    q: "4. When had the banker given this party?",
                    a: "On a winter evening",
                    b: "On a spring afternoon",
                    c: "On an autumn evening",
                    d: "On a summer night",
                    correct: "C"
                },
                {
                    q: "5. Who were at the party?",
                    a: "Only family members",
                    b: "Many clever men",
                    c: "Business partners only",
                    d: "The banker's servants",
                    correct: "B"
                },
                {
                    q: "6. What kind of conversations took place at the party?",
                    a: "Boring and dull conversations",
                    b: "Conversations about money",
                    c: "Interesting conversations",
                    d: "Conversations about the weather",
                    correct: "C"
                },
                {
                    q: "7. Among other things, what had they talked about?",
                    a: "The stock market",
                    b: "Capital punishment",
                    c: "Their favorite books",
                    d: "New business ventures",
                    correct: "B"
                },
                {
                    q: "8. Who made up the majority of the guests?",

                    correct: "B"
                },
                {

                    a: "They strongly supported it",

                {

                },
                {
                    q: "11. In the opinion of some, what should the death penalty be replaced by everywhere?",

                {

                {

                    c: "Only the death penalty",

                },
                {
                    q: "14. How did the banker say one must judge the two punishments?",

                {
                    q: "15. According to the banker, which punishment is more moral and humane?",

                {

                {

                {

                {

                {

                {

                {

                {

                {

                    b: "Spoilt and frivolous, with millions beyond his reckoning",

                    d: "Old and wise",
                    correct: "B"
                },
                {
                    q: "40. How did the banker feel about the bet at supper?",
                    a: "He was worried",
                    b: "He was delighted",
                    c: "He was regretful",
                    d: "He was indifferent",
                    correct: "B"
                },
                {
                    q: "41. What did the banker do at supper regarding the young man?",
                    a: "He praised him",
                    b: "He ignored him",
                    c: "He made fun of him",
                    d: "He drank a toast with him",
                    correct: "C"
                },
                {
                    q: "42. What did the banker advise the young man to do?",
                    a: "To prepare for the confinement",
                    b: "To think better of it while there was still time",
                    c: "To increase the bet",
                    d: "To tell his family",
                    correct: "B"
                },
                {
                    q: "43. What did the banker say the two millions were to him?",
                    a: "His entire fortune",
                    b: "A great sum",
                    c: "A trifle",
                    d: "His life savings",
                    correct: "C"
                },
                {
                    q: "44. How many of the best years of his life did the banker say the young man was losing?",
                    a: "One or two",
                    b: "Three or four",
                    c: "Ten",
                    d: "All of them",
                    correct: "B"
                },
                {
                    q: "45. Why did the banker say voluntary confinement is harder to bear than compulsory?",
                    a: "Because you are alone",
                    b: "Because there is no hope",
                    c: "Because the thought that you have the right to step out at any moment will poison your existence",
                    d: "Because you have no books",
                    correct: "C"
                },
                {
                    q: "46. What did the banker call the young man when giving him advice?",
                    a: "My friend",
                    b: "You happy man",
                    c: "You unhappy man",
                    d: "You clever fellow",
                    correct: "C"
                },
                {
                    q: "47. As the banker walked to and fro years later, what did he ask himself about the bet?",
                    a: "Who had won the bet?",
                    b: "What was the object of that bet?",
                    c: "When would it end?",
                    d: "Was it fair?",
                    correct: "B"
                },
                {
                    q: "48. What was the good of the man losing fifteen years and the banker throwing away two millions?",
                    a: "It proved a point about punishment",
                    b: "It was a good investment",
                    c: "The question implied it had no good",
                    d: "It made them both famous",
                    correct: "C"
                },
                {
                    q: "49. Could the bet prove whether the death penalty is better or worse than life imprisonment?",
                    a: "Yes, it proved it perfectly",
                    b: "The banker thought not; it was nonsensical and meaningless",
                    c: "Only partially",
                    d: "It proved the opposite",
                    correct: "B"
                },
                {
                    q: "50. On the banker's part, what did he think the bet was?",
                    a: "A scientific experiment",
                    b: "A generous offer",
                    c: "The caprice of a pampered man",
                    d: "A way to help a young man",
                    correct: "C"
                }
            ];

            let currentIdx = 0;
            let userAnswers = new Array(50).fill(null);
            let answerStatus = new Array(50).fill(false);
            let streak = 0;

            // DOM elements
            const qText = document.getElementById('questionText');
            const optsDiv = document.getElementById('optionsContainer');
            const feedbackDiv = document.getElementById('feedbackMsg');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const progressFill = document.getElementById('progressFill');
            const streakSpan = document.getElementById('streakDisplay');
            const numberScroll = document.getElementById('numberScroll');
            const reviewDiv = document.getElementById('reviewContainer');
            const scoreDiv = document.getElementById('scoreDisplay');
            const scoreSpan = document.getElementById('scoreValue');
            const restartBtn = document.getElementById('restartBtn');

            function computeScore() {
                return userAnswers.reduce((acc, ans, idx) => acc + (ans && ans === questions[idx].correct ? 1 : 0), 0);
            }
            function answeredCount() { return answerStatus.filter(Boolean).length; }

            function updateProgressAndStreak() {
                progressFill.style.width = (answeredCount()/50)*100 + '%';
                streakSpan.innerHTML = `🔥 ${streak}`;
            }

            function renderNumberScroll() {
                let html = '';
                for (let i=0; i<50; i++) {
                    let cls = 'num-chip-3d';
                    if (i === currentIdx) cls += ' current-chip';
                    if (answerStatus[i]) cls += ' answered-chip';
                    html += `<div class="${cls}" data-qidx="${i}">${i+1}</div>`;
                }
                numberScroll.innerHTML = html;
                document.querySelectorAll('.num-chip-3d').forEach(ch => {
                    ch.addEventListener('click', () => {
                        let idx = ch.dataset.qidx;
                        if (idx !== undefined) { currentIdx = parseInt(idx); renderQuestion(); renderNumberScroll(); }
                    });
                });
            }

            function renderQuestion() {
                const q = questions[currentIdx];
                qText.innerText = q.q;
                const letters = ['A','B','C','D'];
                const opts = [q.a, q.b, q.c, q.d];
                let html = '';
                for (let i=0; i<4; i++) {
                    let extraClass = '';
                    if (answerStatus[currentIdx]) {
                        if (userAnswers[currentIdx] === letters[i]) extraClass = (letters[i] === q.correct) ? 'correct' : 'wrong';
                        else if (letters[i] === q.correct) extraClass = 'correct';
                    }
                    const disabled = answerStatus[currentIdx] ? 'disabled' : '';
                    html += `<div class="opt-3d ${extraClass} ${disabled}" data-opt="${letters[i]}">
                        <span class="letter-3d">${letters[i]}</span>
                        <span>${opts[i]}</span>
                    </div>`;
                }
                optsDiv.innerHTML = html;
                if (!answerStatus[currentIdx]) {
                    document.querySelectorAll('.opt-3d').forEach(opt => {
                        opt.addEventListener('click', e => {
                            if (answerStatus[currentIdx]) return;
                            const selected = opt.dataset.opt;
                            userAnswers[currentIdx] = selected;
                            answerStatus[currentIdx] = true;
                            if (selected === q.correct) streak++; else streak = 0;
                            updateProgressAndStreak();
                            renderQuestion();
                            renderNumberScroll();
                            updateReviewAndScore();
                        });
                    });
                }
                feedbackDiv.innerText = answerStatus[currentIdx] 
                    ? (userAnswers[currentIdx] === q.correct ? '✅ correct!' : `❌ correct: ${q.correct}`) 
                    : '✨ pick one option';
                prevBtn.disabled = (currentIdx === 0);
                nextBtn.disabled = (currentIdx === 49);
            }

            function updateReviewAndScore() {
                let s = computeScore();
                scoreSpan.innerText = s;
                if (answeredCount()>0) scoreDiv.style.display = 'block';
                let wrongs = [];
                for (let i=0; i<50; i++) if (answerStatus[i] && userAnswers[i] !== questions[i].correct) wrongs.push(i);
                if (wrongs.length===0) reviewDiv.innerHTML = '<div>✨ perfect so far</div>';
                else {
                    let rev = '';
                    wrongs.slice(0,4).forEach(w => rev += `<div>• Q${w+1} (correct: ${questions[w].correct})</div>`);
                    if (wrongs.length>4) rev += `<div>... +${wrongs.length-4} more</div>`;
                    reviewDiv.innerHTML = rev;
                }
                reviewDiv.style.display = 'block';
            }

            function goPrev() { if (currentIdx > 0) { currentIdx--; renderQuestion(); renderNumberScroll(); } }
            function goNext() { if (currentIdx < 49) { currentIdx++; renderQuestion(); renderNumberScroll(); } }
            prevBtn.addEventListener('click', goPrev);
            nextBtn.addEventListener('click', goNext);

            function restart() {
                currentIdx = 0; 
                userAnswers.fill(null); 
                answerStatus.fill(false); 
                streak = 0;
                updateProgressAndStreak(); 
                renderQuestion(); 
                renderNumberScroll(); 
                reviewDiv.style.display = 'none'; 
                scoreDiv.style.display = 'none';
            }
            restartBtn.addEventListener('click', restart);

            // Initial render
            renderNumberScroll();
            renderQuestion();
            updateProgressAndStreak();
            reviewDiv.style.display = 'none';
            scoreDiv.style.display = 'none';
        })();
    </script>
</body>
</html
